<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ajouter Video</title>
</head>
<body>
<h1>Ajouter Video</h1>
<form th:action="@{/videos}" th:object="${video}" method="post">
    <label>Nom:</label>
    <input type="text" th:field="*{name}" required />
    <label>URL:</label>
    <input type="text" th:field="*{url}" required />
    <label>Description:</label>
    <input type="text" th:field="*{description}" required />
    <button type="submit">Ajouter</button>
</form>
<a href="/videos">Retour</a>
</body>
</html>
